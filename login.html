<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mozshopping</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Configuração -->
    <script src="firebase-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #333;
        }

        .logo span {
            color: #667eea;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab.active {
            color: #667eea;
            position: relative;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #667eea;
            border-radius: 3px 3px 0 0;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-login:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-google:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            font-size: 14px;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 10px;
            display: none;
            padding: 10px;
            background: #fff5f5;
            border-radius: 8px;
            border-left: 3px solid #e53e3e;
        }

        .success-message {
            color: #38a169;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 10px;
            display: none;
            padding: 10px;
            background: #f0fff4;
            border-radius: 8px;
            border-left: 3px solid #38a169;
        }

        .info-message {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .info-message a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .info-message a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading i {
            font-size: 24px;
            color: #667eea;
        }

        .back-to-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-home a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .back-to-home a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;">
                    <h1>Moz<span>shopping</span></h1>
                </a>
            </div>

            <div class="tab-container">
                <div class="tab active" onclick="mudarTab('login')">Entrar</div>
                <div class="tab" onclick="mudarTab('cadastro')">Registar</div>
            </div>

            <!-- Formulário de Login -->
            <div class="form active" id="loginForm">
                <form onsubmit="fazerLogin(event)">
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="loginSenha" placeholder="••••••••" required>
                    </div>
                    <div id="loginError" class="error-message"></div>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
                
                <div class="divider">ou</div>
                
                <button class="btn-google" onclick="loginComGoogle()">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Continuar com Google
                </button>
                
                <div class="info-message">
                    Novo por aqui? <a onclick="mudarTab('cadastro')">Registar</a>
                </div>
            </div>

            <!-- Formulário de Cadastro -->
            <div class="form" id="cadastroForm">
                <form onsubmit="fazerCadastro(event)">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="cadastroNome" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="cadastroEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Senha (mínimo 6 caracteres)</label>
                        <input type="password" id="cadastroSenha" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="cadastroConfirmar" required>
                    </div>
                    <div id="cadastroError" class="error-message"></div>
                    <div id="cadastroSuccess" class="success-message"></div>
                    <button type="submit" class="btn-login">Criar Conta</button>
                </form>
                
                <div class="info-message">
                    Já tem uma conta? <a onclick="mudarTab('login')">Entrar</a>
                </div>
            </div>

            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Processando...
            </div>
        </div>
        
        <div class="back-to-home">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar para loja</a>
        </div>
    </div>

    <script>
        // ============================================
        // FUNÇÕES DE INTERFACE
        // ============================================
        
        function mudarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('loginEmail').focus();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('cadastroForm').classList.add('active');
                document.getElementById('cadastroNome').focus();
            }
        }

        function mostrarErro(elementId, mensagem) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.textContent = mensagem;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }

        function mostrarSucesso(elementId, mensagem) {
            const successDiv = document.getElementById(elementId);
            successDiv.textContent = mensagem;
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function mostrarLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function esconderLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // ============================================
        // LOGIN COM EMAIL/SENHA
        // ============================================
        
        async function fazerLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            
            mostrarLoading();
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, senha);
                console.log('Login bem-sucedido:', userCredential.user.email);
                
                // Verificar se é admin
                const admin = await isAdmin(userCredential.user.uid);
                
                if (admin) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
                
            } catch (error) {
                console.error('Erro no login:', error);
                esconderLoading();
                
                // Mensagem única para dados incorretos
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    mostrarErro('loginError', 'E-mail ou senha incorretos');
                } else if (error.code === 'auth/invalid-email') {
                    mostrarErro('loginError', 'E-mail inválido');
                } else if (error.code === 'auth/too-many-requests') {
                    mostrarErro('loginError', 'Muitas tentativas. Tente novamente mais tarde');
                } else {
                    mostrarErro('loginError', 'Erro ao fazer login');
                }
            }
        }

        // ============================================
        // CADASTRO
        // ============================================
        
        async function fazerCadastro(event) {
            event.preventDefault();
            
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const confirmar = document.getElementById('cadastroConfirmar').value;
            
            if (senha !== confirmar) {
                mostrarErro('cadastroError', 'As senhas não conferem');
                return;
            }
            
            if (senha.length < 6) {
                mostrarErro('cadastroError', 'A senha deve ter pelo menos 6 caracteres');
                return;
            }
            
            mostrarLoading();
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
                
                await userCredential.user.updateProfile({
                    displayName: nome
                });
                
                await db.collection('usuarios').doc(userCredential.user.uid).set({
                    nome: nome,
                    email: email,
                    isAdmin: false,
                    dataCadastro: new Date().toISOString()
                });
                
                mostrarSucesso('cadastroSuccess', 'Conta criada com sucesso! Redirecionando...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Erro no cadastro:', error);
                esconderLoading();
                
                if (error.code === 'auth/email-already-in-use') {
                    mostrarErro('cadastroError', 'Este e-mail já está cadastrado');
                } else if (error.code === 'auth/invalid-email') {
                    mostrarErro('cadastroError', 'E-mail inválido');
                } else if (error.code === 'auth/weak-password') {
                    mostrarErro('cadastroError', 'Senha muito fraca');
                } else {
                    mostrarErro('cadastroError', 'Erro ao criar conta');
                }
            }
        }

        // ============================================
        // LOGIN COM GOOGLE
        // ============================================
        
        async function loginComGoogle() {
            mostrarLoading();
            
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                console.log('Login Google bem-sucedido:', user.email);
                
                // Verificar se usuário já existe no Firestore
                const userDoc = await db.collection('usuarios').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // Primeiro login - salvar dados
                    await db.collection('usuarios').doc(user.uid).set({
                        nome: user.displayName,
                        email: user.email,
                        isAdmin: false,
                        dataCadastro: new Date().toISOString()
                    });
                }
                
                // Verificar se é admin
                const admin = await isAdmin(user.uid);
                
                if (admin) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
                
            } catch (error) {
                console.error('Erro no login Google:', error);
                esconderLoading();
                
                if (error.code === 'auth/popup-closed-by-user') {
                    // Usuário fechou o popup, não mostrar erro
                } else if (error.code === 'auth/popup-blocked') {
                    mostrarErro('loginError', 'Popup bloqueado. Permita popups para este site.');
                } else {
                    mostrarErro('loginError', 'Erro ao fazer login com Google');
                }
            }
        }

        // ============================================
        // VERIFICAR SE JÁ ESTÁ LOGADO
        // ============================================
        
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log('Usuário já logado:', user.email);
                // Não redireciona automaticamente - deixa o usuário decidir
            }
        });

        // ============================================
        // EXPORTAR FUNÇÕES
        // ============================================
        
        window.mudarTab = mudarTab;
        window.fazerLogin = fazerLogin;
        window.fazerCadastro = fazerCadastro;
        window.loginComGoogle = loginComGoogle;
    </script>
</body>
</html>
