<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Favoritos - Mozshopping</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">...</header> <!-- igual ao index -->
    <main class="main-content">
        <div class="container">
            <h1 style="margin-bottom: 30px;">Meus Favoritos</h1>
            <div class="products-grid" id="favoritosGrid"></div>
        </div>
    </main>
    <footer class="footer">...</footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
    <script>
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            const favoritosIds = await getFavoritos(user.uid);
            const produtos = [];
            for (let id of favoritosIds) {
                const p = await buscarProduto(id);
                if (p) produtos.push(p);
            }
            renderizarProdutos(produtos); // reutiliza função do main
        });
    </script>
</body>
</html>
